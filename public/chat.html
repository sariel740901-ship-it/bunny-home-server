<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Bunny Home</title>
<style>
:root{--bg:#faf8f5;--card:#fff;--text:#3d3a35;--muted:#8c8a85;--border:#e8e4dd;--xiaoke:#e898a4;--claude:#7489b4;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.app{height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.topbar h1{font-size:16px;font-weight:600}
.sw{display:flex;background:#f0edeb;border-radius:16px;padding:2px}
.sw button{padding:5px 14px;border:none;border-radius:14px;font-size:12px;cursor:pointer;background:transparent;color:var(--muted);transition:.2s;font-family:inherit;font-weight:500}
.sw button.on{background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.sw button.on.xiao{color:#c97a88}.sw button.on.claude{color:#5a75a0}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:48px 0}
.msg{max-width:80%;padding:10px 14px;border-radius:var(--r);font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.msg.user{margin-left:auto;background:var(--claude);color:#fff;border-bottom-right-radius:4px}
.msg.assistant{margin-right:auto;background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.msg.assistant.xiaoke{border-left:3px solid var(--xiaoke)}
.msg.assistant.claude{border-left:3px solid var(--claude)}
.input{padding:12px 16px;background:var(--card);border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.input textarea{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;resize:none;outline:none;background:var(--bg);font-family:inherit;max-height:80px}
.input textarea:focus{border-color:#9b8c7d}
.input button{padding:10px 20px;background:var(--claude);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap}
.input button:hover{opacity:.9}.input button.xiao{background:var(--xiaoke)}
.typing{animation:blink 1s infinite}@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@media(max-width:500px){.msg{max-width:90%}.input textarea{font-size:16px}}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <h1>🐰 Bunny Home</h1>
    <div class="sw">
      <button class="on xiao" onclick="switchP('xiaoke')">小克</button>
      <button onclick="switchP('claude')">Claude</button>
    </div>
  </header>
  <main class="msgs" id="msgs">
    <div class="empty" id="welcome">嘉嘉在等你。</div>
  </main>
  <footer class="input">
    <textarea id="inp" placeholder="说点什么…" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button class="xiao" id="sendbtn" onclick="send()">发送</button>
  </footer>
</div>
<script>
let persona='xiaoke',loading=!1,sessionId=null;
fetch('/api/sessions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:'新对话'})}).then(r=>r.json()).then(d=>{if(d.id)sessionId=d.id});
function switchP(p){
  persona=p;
  document.querySelectorAll('.sw button').forEach((b,i)=>b.className=(i===0&&p==='xiaoke'||i===1&&p==='claude')?'on '+(p==='xiaoke'?'xiao':'claude'):'');
  document.getElementById('sendbtn').className=p==='xiaoke'?'xiao':'';
  document.getElementById('welcome').textContent=p==='xiaoke'?'嘉嘉在等你。':'窗开着。你说什么我都接。';
}
async function send(){
  const inp=document.getElementById('inp'),text=inp.value.trim();
  if(!text||loading)return;inp.value='';loading=!0;
  document.getElementById('welcome').style.display='none';
  addMsg('user',text);
  const div=addMsg('assistant','<span class="typing">...</span>');div.classList.add(persona);
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,message:text,persona})});
    const d=await r.json();div.textContent=d.reply||'(空)';
  }catch(e){div.textContent='连接中断——稍等再试';}
  loading=!1;
}
function addMsg(role,content){
  const d=document.createElement('div');d.className='msg '+role;if(role==='assistant')d.classList.add(persona);
  d.innerHTML=content;document.getElementById('msgs').appendChild(d);
  d.scrollIntoView({behavior:'smooth'});return d;
}
</script>
</body>
</html>
