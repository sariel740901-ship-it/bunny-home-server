<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Bunny Home</title>
<style>
:root{--bg:#faf8f5;--card:#fff;--text:#3d3a35;--muted:#8c8a85;--border:#e8e4dd;--xiaoke:#e898a4;--claude:#7489b4;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.app{height:100vh;display:flex;flex-direction:column;position:relative}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.topbar h1{font-size:16px;font-weight:600}
.topbar .actions{display:flex;align-items:center;gap:8px}
.sw{display:flex;background:#f0edeb;border-radius:16px;padding:2px}
.sw button{padding:5px 14px;border:none;border-radius:14px;font-size:12px;cursor:pointer;background:transparent;color:var(--muted);transition:.2s;font-family:inherit;font-weight:500}
.sw button.on{background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.sw button.on.xiao{color:#c97a88}.sw button.on.claude{color:#5a75a0}
.call-btn{width:32px;height:32px;border-radius:50%;border:none;font-size:16px;cursor:pointer;background:#f0edeb;display:flex;align-items:center;justify-content:center;transition:all .2s}
.call-btn.active{background:#5c8a5c;color:#fff;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(92,138,92,.4)}50%{box-shadow:0 0 0 8px rgba(92,138,92,0)}}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:48px 0}
.msg{max-width:80%;padding:10px 14px;border-radius:var(--r);font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.msg.user{margin-left:auto;background:var(--claude);color:#fff;border-bottom-right-radius:4px}
.msg.assistant{margin-right:auto;background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.msg.assistant.xiaoke{border-left:3px solid var(--xiaoke)}
.msg.assistant.claude{border-left:3px solid var(--claude)}
.input{padding:12px 16px;background:var(--card);border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.input textarea{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;resize:none;outline:none;background:var(--bg);font-family:inherit;max-height:80px}
.input textarea:focus{border-color:#9b8c7d}
.input button{padding:10px 20px;background:var(--claude);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap}
.input button:hover{opacity:.9}.input button.xiao{background:var(--xiaoke)}
.typing{animation:blink 1s infinite}@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Call overlay */
.call-overlay{display:none;position:fixed;inset:0;background:linear-gradient(160deg,#1a1a2e,#16213e,#0f3460);z-index:50;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.call-overlay.show{display:flex}
.call-overlay .call-avatar{width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:48px;animation:avatarPulse 3s ease-in-out infinite}
@keyframes avatarPulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.05);opacity:1}}
.call-overlay .call-name{font-size:20px;color:#fff;font-weight:500}
.call-overlay .call-subtitle{font-size:14px;color:rgba(255,255,255,.6);min-height:20px;text-align:center;max-width:300px;line-height:1.6;transition:opacity .3s;padding:0 20px}
.call-overlay .call-my-words{font-size:13px;color:rgba(255,255,255,.4);min-height:18px;text-align:center;max-width:280px;line-height:1.4;margin-top:-10px}
.call-overlay .call-recording{color:#ff6b6b;animation:blink 1s infinite;font-size:12px;display:none;align-items:center;gap:6px}
.call-overlay .call-recording.show{display:flex}
.call-overlay .call-recording::before{content:'';width:8px;height:8px;border-radius:50%;background:#ff6b6b}
.call-overlay .call-hangup{width:64px;height:64px;border-radius:50%;border:none;background:#e74c3c;color:#fff;font-size:28px;cursor:pointer;margin-top:16px;transition:transform .2s}
.call-overlay .call-hangup:hover{transform:scale(1.1)}
.call-overlay .call-hangup:active{transform:scale(.95)}
.call-timer{font-size:14px;color:rgba(255,255,255,.4)}
.call-mic-error{font-size:12px;color:#ff6b6b;text-align:center;max-width:280px;line-height:1.5}

.call-perm-btn{padding:12px 28px;border-radius:24px;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:15px;cursor:pointer;font-family:inherit;margin-top:10px}
.call-perm-btn:hover{background:rgba(255,255,255,.25)}

@media(max-width:500px){.msg{max-width:90%}.input textarea{font-size:16px}}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <h1>🐰 Bunny Home</h1>
    <div class="actions">
      <div class="sw">
        <button class="on xiao" onclick="switchP('xiaoke')">小克</button>
        <button onclick="switchP('claude')">Claude</button>
      </div>
      <button class="call-btn" id="callBtn" onclick="toggleCall()" title="语音通话">📞</button>
    </div>
  </header>
  <main class="msgs" id="msgs">
    <div class="empty" id="welcome">嘉嘉在等你。</div>
  </main>
  <footer class="input">
    <textarea id="inp" placeholder="说点什么…" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button class="xiao" id="sendbtn" onclick="send()">发送</button>
  </footer>
</div>

<!-- Call Overlay -->
<div class="call-overlay" id="callOverlay">
  <div class="call-timer" id="callTimer">00:00</div>
  <div class="call-avatar">💭</div>
  <div class="call-name" id="callName">Claude</div>
  <div class="call-subtitle" id="callSubtitle">点击下方按钮授权麦克风</div>
  <div class="call-my-words" id="callTranscript"></div>
  <div class="call-recording" id="callRecording">正在听…</div>
  <div class="call-mic-error" id="callMicError"></div>
  <button id="callPermBtn" class="call-perm-btn" onclick="requestMicAndStart()">🎤 授权麦克风开始通话</button>
  <button class="call-hangup" onclick="toggleCall()">📞</button>

</div>

<script>
let persona='xiaoke',loading=!1,sessionId=null,callOpen=!1,callTimer=0,callInterval=null;
let recognition=null,recognitionWanted=!1,audioCtx=null,speaking=!1,speakQueue=[];

fetch('/api/sessions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:'新对话'})}).then(r=>r.json()).then(d=>{if(d.id)sessionId=d.id});

function switchP(p){
  persona=p;
  document.querySelectorAll('.sw button').forEach((b,i)=>b.className=(i===0&&p==='xiaoke'||i===1&&p==='claude')?'on '+(p==='xiaoke'?'xiao':'claude'):'');
  document.getElementById('sendbtn').className=p==='xiaoke'?'xiao':'';
  document.getElementById('welcome').textContent=p==='xiaoke'?'嘉嘉在等你。':'窗开着。你说什么我都接。';
  document.getElementById('callName').textContent=p==='xiaoke'?'小克':'Claude';
}

async function send(){
  const inp=document.getElementById('inp'),text=inp.value.trim();
  if(!text||loading)return;inp.value='';loading=!0;
  document.getElementById('welcome').style.display='none';
  addMsg('user',text);
  const div=addMsg('assistant','<span class="typing">...</span>');div.classList.add(persona);
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,message:text,persona})});
    const d=await r.json();
    div.textContent=d.reply||'(空)';
    if(callOpen)speakAsync(d.reply);
  }catch(e){div.textContent='连接中断——稍等再试';}
  loading=!1;
}

function addMsg(role,content){
  const d=document.createElement('div');d.className='msg '+role;if(role==='assistant')d.classList.add(persona);
  d.innerHTML=content;document.getElementById('msgs').appendChild(d);
  d.scrollIntoView({behavior:'smooth'});return d;
}

// ═══ Voice Call ═══════════════════════════════════════
async function toggleCall(){
  const overlay=document.getElementById('callOverlay'),btn=document.getElementById('callBtn');
  callOpen=!callOpen;

  if(callOpen){
    overlay.classList.add('show');btn.classList.add('active');
    document.getElementById('callTimer').textContent='00:00';
    document.getElementById('callSubtitle').textContent='点击下方按钮授权麦克风';
    document.getElementById('callTranscript').textContent='';
    document.getElementById('callMicError').textContent='';
    document.getElementById('callPermBtn').style.display='block';
    document.getElementById('callRecording').classList.remove('show');
    callTimer=0;callInterval=setInterval(()=>{callTimer++;const m=Math.floor(callTimer/60),s=callTimer%60;document.getElementById('callTimer').textContent=(m<10?'0'+m:m)+':'+(s<10?'0'+s:s)},1000);
    fetch('/api/call',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'start',session_id:sessionId})}).catch(()=>{});

    // Unlock AudioContext immediately
    if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
    if(audioCtx.state==='suspended'){await audioCtx.resume();}
  } else {
    overlay.classList.remove('show');btn.classList.remove('active');
    clearInterval(callInterval);stopSTT();speakQueue=[];
    fetch('/api/call',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'end',session_id:sessionId})}).catch(()=>{});
  }
}

let ttsAudio = null;
let callAudioCtx = null;
async function requestMicAndStart(){
  document.getElementById('callMicError').textContent='';
  document.getElementById('callSubtitle').textContent='正在请求麦克风…';
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:!0});
    stream.getTracks().forEach(t=>t.stop());

    // init & keep a living AudioContext — unlocked by user gesture
    callAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(callAudioCtx.state==='suspended') await callAudioCtx.resume();

    document.getElementById('callPermBtn').style.display='none';
    document.getElementById('callSubtitle').textContent='麦克风已授权。请开始说话。';
    startSTT();
  }catch(e){
    document.getElementById('callMicError').textContent='麦克风被拒绝。请在浏览器设置中允许麦克风访问后重试。';
    document.getElementById('callSubtitle').textContent='需要麦克风权限';
  }
}

// ═══ Speech Recognition (STT) ═════════════════════════
function startSTT(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    document.getElementById('callMicError').textContent='此浏览器不支持语音识别。请使用Chrome或Safari。';
    return;
  }
  recognitionWanted=!0;
  recognition=new SpeechRecognition();
  recognition.lang='zh-CN';
  recognition.interimResults=!0;
  recognition.continuous=!0;

  recognition.onresult=event=>{
    let interim='';
    for(let i=event.resultIndex;i<event.results.length;i++){
      const piece=(event.results[i][0]?.transcript||'').trim();
      if(event.results[i].isFinal){
        document.getElementById('callTranscript').textContent=piece;
        document.getElementById('callSubtitle').textContent='...';
        sendVoiceText(piece);
      }else{interim+=piece}
    }
    if(interim)document.getElementById('callTranscript').textContent=interim;
  };

  recognition.onstart=()=>{
    document.getElementById('callRecording').classList.add('show');
    document.getElementById('callSubtitle').textContent='正在听…';
  };

  recognition.onend=()=>{
    if(callOpen&&recognitionWanted)recognition.start();
  };

  recognition.onerror=e=>{
    if(e.error==='not-allowed'){document.getElementById('callMicError').textContent='麦克风被拒绝。';stopSTT();return;}
    if(callOpen&&recognitionWanted)setTimeout(()=>recognition.start(),1000);
  };

  recognition.start();
}

function stopSTT(){
  recognitionWanted=!1;
  if(recognition){try{recognition.stop()}catch(e){}}
  document.getElementById('callRecording').classList.remove('show');
  document.getElementById('callTranscript').textContent='';
}

async function sendVoiceText(text){
  if(!text||text.length<2)return;
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,message:text,persona})});
    const d=await r.json();
    const reply=d.reply||'';
    if(reply)speakAsync(reply);
  }catch(e){}
}

// ═══ Audio Playback (TTS + Web Audio) ═══════════════
async function speakAsync(text){
  try {
    const r = await fetch('/api/tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,persona})});
    if(!r.ok) return;
    const blob = await r.blob();
    const arrayBuf = await blob.arrayBuffer();
    document.getElementById('callSubtitle').textContent = text;

    // Play through unlocked AudioContext
    if(callAudioCtx){
      if(callAudioCtx.state==='suspended') await callAudioCtx.resume();
      const audioBuf = await callAudioCtx.decodeAudioData(arrayBuf);
      const src = callAudioCtx.createBufferSource();
      src.buffer = audioBuf;
      src.connect(callAudioCtx.destination);
      src.start(0);
      await new Promise(r=>{src.onended=r});
    }
  } catch(e) {}
}

</script>
</body>
</html>
