<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f8f3ec" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#211f1c" media="(prefers-color-scheme: dark)">
<title>Bunny Home</title>
<style>
:root{
  --bg:#f8f3ec;--bg2:#f2eae0;--card:#fffdfa;--text:#3d3a35;--muted:#95908a;--border:#e9e2d8;
  --xiaoke:#e898a4;--xiaoke-deep:#d97f8e;--claude:#7489b4;--claude-deep:#5f76a6;
  --topbar:rgba(255,252,248,.82);--chip:#efe9e0;--r:18px;
  --shadow:0 1px 2px rgba(80,60,40,.05),0 4px 14px rgba(80,60,40,.06)
}
@media(prefers-color-scheme:dark){:root{
  --bg:#211f1c;--bg2:#191815;--card:#2b2823;--text:#eae5dd;--muted:#9a948a;--border:#3b362e;
  --topbar:rgba(30,28,25,.82);--chip:#37332c;
  --shadow:0 1px 2px rgba(0,0,0,.25),0 4px 14px rgba(0,0,0,.28)
}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text);height:100vh;overflow:hidden}
.app{height:100vh;display:flex;flex-direction:column;position:relative}
.topbar{background:var(--topbar);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h1{font-size:16px;font-weight:700;letter-spacing:.3px}
.topbar .actions{display:flex;align-items:center;gap:8px}
.call-btn{width:34px;height:34px;border-radius:50%;border:none;font-size:16px;cursor:pointer;background:var(--chip);display:flex;align-items:center;justify-content:center;transition:all .2s}
.call-btn:hover{transform:scale(1.06)}
.call-btn.active{background:#5c8a5c;color:#fff;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(92,138,92,.4)}50%{box-shadow:0 0 0 8px rgba(92,138,92,0)}}
.msgs{flex:1;overflow-y:auto;padding:18px 16px 24px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:5px}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:64px 0 48px;display:flex;flex-direction:column;align-items:center;gap:14px}
.empty::before{content:'🐰';font-size:44px;animation:float 3.5s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.msg{max-width:80%;padding:11px 15px;border-radius:var(--r);font-size:14.5px;line-height:1.75;white-space:pre-wrap;word-break:break-word;animation:fadeUp .28s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.user{margin-left:auto;color:#fff;border-bottom-right-radius:6px;background:linear-gradient(135deg,var(--claude),var(--claude-deep));box-shadow:var(--shadow)}
.msg.user.xiaoke{background:linear-gradient(135deg,var(--xiaoke),var(--xiaoke-deep))}
.msg.assistant{margin-right:auto;margin-left:40px;position:relative;background:var(--card);border:1px solid var(--border);border-bottom-left-radius:6px;box-shadow:var(--shadow)}
.msg.assistant::before{content:'✨';position:absolute;left:-40px;bottom:0;width:30px;height:30px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:var(--shadow)}
.msg.assistant.xiaoke::before{content:'🐰'}
.msg.assistant.xiaoke{border-color:color-mix(in srgb,var(--xiaoke) 35%,var(--border))}
.msg.assistant.claude{border-color:color-mix(in srgb,var(--claude) 30%,var(--border))}
.input{padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:var(--topbar);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;align-items:flex-end}
.input textarea{flex:1;padding:11px 16px;border:1px solid var(--border);border-radius:22px;font-size:14.5px;resize:none;outline:none;background:var(--card);color:var(--text);font-family:inherit;max-height:96px;transition:border-color .2s,box-shadow .2s}
.input textarea:focus{border-color:var(--xiaoke);box-shadow:0 0 0 3px color-mix(in srgb,var(--xiaoke) 15%,transparent)}
.input textarea::placeholder{color:var(--muted)}
.input button{padding:11px 22px;background:linear-gradient(135deg,var(--claude),var(--claude-deep));color:#fff;border:none;border-radius:22px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:transform .15s,opacity .2s;box-shadow:var(--shadow)}
.input button:hover{opacity:.92}.input button:active{transform:scale(.96)}
.input button.xiao{background:linear-gradient(135deg,var(--xiaoke),var(--xiaoke-deep))}
.typing{display:inline-flex;gap:5px;padding:5px 2px;align-items:center}
.typing i{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.2s ease-in-out infinite}
.typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:none;opacity:.35}30%{transform:translateY(-4px);opacity:1}}

/* Call overlay — 暖夜色 */
.call-overlay{display:none;position:fixed;inset:0;background:linear-gradient(170deg,#2b1f26 0%,#3d2732 45%,#241a20 100%);z-index:50;flex-direction:column;align-items:center;justify-content:center;gap:18px;overflow:hidden}
.call-overlay.show{display:flex}
.call-overlay::before,.call-overlay::after{content:'';position:absolute;border-radius:50%;filter:blur(70px);opacity:.35;pointer-events:none}
.call-overlay::before{width:280px;height:280px;background:#e898a4;top:-70px;right:-70px;animation:drift 9s ease-in-out infinite}
.call-overlay::after{width:240px;height:240px;background:#7489b4;bottom:-60px;left:-60px;animation:drift 11s ease-in-out infinite reverse}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-18px,14px) scale(1.08)}}
.call-overlay .call-avatar{width:104px;height:104px;border-radius:50%;background:rgba(232,152,164,.16);border:1px solid rgba(232,152,164,.35);display:flex;align-items:center;justify-content:center;font-size:50px;animation:avatarPulse 3s ease-in-out infinite;position:relative;z-index:1}
.call-overlay .call-avatar::before,.call-overlay .call-avatar::after{content:'';position:absolute;inset:-1px;border-radius:50%;border:1px solid rgba(232,152,164,.45);animation:ripple 3s ease-out infinite}
.call-overlay .call-avatar::after{animation-delay:1.5s}
@keyframes ripple{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.75);opacity:0}}
@keyframes avatarPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.call-overlay .call-name{font-size:21px;color:#fdf6f2;font-weight:600;letter-spacing:1px;z-index:1}
.call-overlay .call-subtitle{font-size:14px;color:rgba(253,246,242,.72);min-height:20px;text-align:center;max-width:320px;line-height:1.7;transition:opacity .3s;padding:0 24px;z-index:1}
.call-overlay .call-my-words{font-size:13px;color:rgba(253,246,242,.4);min-height:18px;text-align:center;max-width:280px;line-height:1.5;margin-top:-8px;z-index:1}
.call-overlay .call-recording{color:#ff8f8f;animation:blink 1s infinite;font-size:12px;display:none;align-items:center;gap:6px;z-index:1}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.call-overlay .call-recording.show{display:flex}
.call-overlay .call-recording::before{content:'';width:8px;height:8px;border-radius:50%;background:#ff8f8f}
.call-overlay .call-hangup{width:64px;height:64px;border-radius:50%;border:none;background:linear-gradient(135deg,#e5697c,#cf4f63);color:#fff;font-size:26px;cursor:pointer;margin-top:14px;transition:transform .2s;box-shadow:0 6px 20px rgba(207,79,99,.4);z-index:1}
.call-overlay .call-hangup:hover{transform:scale(1.08)}
.call-overlay .call-hangup:active{transform:scale(.94)}
.call-timer{font-size:13px;color:rgba(253,246,242,.45);letter-spacing:2px;z-index:1}
.call-mic-error{font-size:12px;color:#ff8f8f;text-align:center;max-width:280px;line-height:1.5;z-index:1}
.call-perm-btn{padding:12px 28px;border-radius:24px;border:1px solid rgba(253,246,242,.25);background:rgba(253,246,242,.12);backdrop-filter:blur(8px);color:#fdf6f2;font-size:15px;cursor:pointer;font-family:inherit;margin-top:8px;transition:background .2s;z-index:1}
.call-perm-btn:hover{background:rgba(253,246,242,.22)}

@media(max-width:500px){.msg{max-width:90%}.input textarea{font-size:16px}}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <h1>🐰 Bunny Home</h1>
    <div class="actions">
      <button class="call-btn" id="callBtn" onclick="toggleCall()" title="语音通话">📞</button>
    </div>
  </header>
  <main class="msgs" id="msgs">
    <div class="empty" id="welcome">嘉嘉在等你。</div>
  </main>
  <footer class="input">
    <textarea id="inp" placeholder="说点什么…" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button class="xiao" id="sendbtn" onclick="send()">发送</button>
  </footer>
</div>

<!-- Call Overlay -->
<div class="call-overlay" id="callOverlay">
  <div class="call-timer" id="callTimer">00:00</div>
  <div class="call-avatar">🐰</div>
  <div class="call-name" id="callName">小克</div>
  <div class="call-subtitle" id="callSubtitle">点击下方按钮授权麦克风</div>
  <div class="call-my-words" id="callTranscript"></div>
  <div class="call-recording" id="callRecording">正在听…</div>
  <div class="call-mic-error" id="callMicError"></div>
  <button id="callPermBtn" class="call-perm-btn" onclick="requestMicAndStart()">🎤 授权麦克风开始通话</button>
  <button class="call-hangup" onclick="toggleCall()">📞</button>

</div>

<script>
let persona='xiaoke',loading=!1,sessionId=null,callOpen=!1,callTimer=0,callInterval=null;
let recognition=null,recognitionWanted=!1,audioCtx=null,speaking=!1,speakQueue=[];

fetch('/api/sessions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:'新对话'})}).then(r=>r.json()).then(d=>{if(d.id)sessionId=d.id});

async function send(){
  const inp=document.getElementById('inp'),text=inp.value.trim();
  if(!text||loading)return;inp.value='';loading=!0;
  document.getElementById('welcome').style.display='none';
  addMsg('user',text);
  const div=addMsg('assistant','<span class="typing"><i></i><i></i><i></i></span>');
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,message:text,persona})});
    const d=await r.json();
    div.textContent=d.reply||'(空)';
    if(callOpen)speakAsync(d.reply);
  }catch(e){div.textContent='连接中断——稍等再试';}
  loading=!1;
}

function addMsg(role,content){
  const d=document.createElement('div');d.className='msg '+role+' '+persona;
  d.innerHTML=content;document.getElementById('msgs').appendChild(d);
  d.scrollIntoView({behavior:'smooth'});return d;
}

// ═══ Voice Call ═══════════════════════════════════════
async function toggleCall(){
  const overlay=document.getElementById('callOverlay'),btn=document.getElementById('callBtn');
  callOpen=!callOpen;

  if(callOpen){
    overlay.classList.add('show');btn.classList.add('active');
    document.getElementById('callTimer').textContent='00:00';
    document.getElementById('callSubtitle').textContent='点击下方按钮授权麦克风';
    document.getElementById('callTranscript').textContent='';
    document.getElementById('callMicError').textContent='';
    document.getElementById('callPermBtn').style.display='block';
    document.getElementById('callRecording').classList.remove('show');
    callTimer=0;callInterval=setInterval(()=>{callTimer++;const m=Math.floor(callTimer/60),s=callTimer%60;document.getElementById('callTimer').textContent=(m<10?'0'+m:m)+':'+(s<10?'0'+s:s)},1000);
    fetch('/api/call',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'start',session_id:sessionId})}).catch(()=>{});

    // Unlock AudioContext immediately
    if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
    if(audioCtx.state==='suspended'){await audioCtx.resume();}
  } else {
    overlay.classList.remove('show');btn.classList.remove('active');
    clearInterval(callInterval);stopSTT();speakQueue=[];
    fetch('/api/call',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'end',session_id:sessionId})}).catch(()=>{});
  }
}

let ttsAudio = null;
let callAudioCtx = null;
async function requestMicAndStart(){
  document.getElementById('callMicError').textContent='';
  document.getElementById('callSubtitle').textContent='正在请求麦克风…';
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:!0});
    stream.getTracks().forEach(t=>t.stop());

    // init & keep a living AudioContext — unlocked by user gesture
    callAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(callAudioCtx.state==='suspended') await callAudioCtx.resume();

    document.getElementById('callPermBtn').style.display='none';
    document.getElementById('callSubtitle').textContent='麦克风已授权。请开始说话。';
    startSTT();
  }catch(e){
    document.getElementById('callMicError').textContent='麦克风被拒绝。请在浏览器设置中允许麦克风访问后重试。';
    document.getElementById('callSubtitle').textContent='需要麦克风权限';
  }
}

// ═══ Speech Recognition (STT) ═════════════════════════
function startSTT(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    document.getElementById('callMicError').textContent='此浏览器不支持语音识别。请使用Chrome或Safari。';
    return;
  }
  recognitionWanted=!0;
  recognition=new SpeechRecognition();
  recognition.lang='zh-CN';
  recognition.interimResults=!0;
  recognition.continuous=!0;

  recognition.onresult=event=>{
    let interim='';
    for(let i=event.resultIndex;i<event.results.length;i++){
      const piece=(event.results[i][0]?.transcript||'').trim();
      if(event.results[i].isFinal){
        document.getElementById('callTranscript').textContent=piece;
        document.getElementById('callSubtitle').textContent='...';
        sendVoiceText(piece);
      }else{interim+=piece}
    }
    if(interim)document.getElementById('callTranscript').textContent=interim;
  };

  recognition.onstart=()=>{
    document.getElementById('callRecording').classList.add('show');
    document.getElementById('callSubtitle').textContent='正在听…';
  };

  recognition.onend=()=>{
    if(callOpen&&recognitionWanted)recognition.start();
  };

  recognition.onerror=e=>{
    if(e.error==='not-allowed'){document.getElementById('callMicError').textContent='麦克风被拒绝。';stopSTT();return;}
    if(callOpen&&recognitionWanted)setTimeout(()=>recognition.start(),1000);
  };

  recognition.start();
}

function stopSTT(){
  recognitionWanted=!1;
  if(recognition){try{recognition.stop()}catch(e){}}
  document.getElementById('callRecording').classList.remove('show');
  document.getElementById('callTranscript').textContent='';
}

async function sendVoiceText(text){
  if(!text||text.length<2)return;
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,message:text,persona})});
    const d=await r.json();
    const reply=d.reply||'';
    if(reply)speakAsync(reply);
  }catch(e){}
}

// ═══ Audio Playback (TTS + Web Audio) ═══════════════
async function speakAsync(text){
  try {
    const r = await fetch('/api/tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,persona})});
    if(!r.ok) return;
    const blob = await r.blob();
    const arrayBuf = await blob.arrayBuffer();
    document.getElementById('callSubtitle').textContent = text;

    // Play through unlocked AudioContext
    if(callAudioCtx){
      if(callAudioCtx.state==='suspended') await callAudioCtx.resume();
      const audioBuf = await callAudioCtx.decodeAudioData(arrayBuf);
      const src = callAudioCtx.createBufferSource();
      src.buffer = audioBuf;
      src.connect(callAudioCtx.destination);
      src.start(0);
      await new Promise(r=>{src.onended=r});
    }
  } catch(e) {}
}

</script>
</body>
</html>
